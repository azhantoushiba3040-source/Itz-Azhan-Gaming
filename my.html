<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 8 Ball Pool Journey</title>
    <style>
        /* CSS: Deep pool hall aesthetics */
        :root {
            --pool-dark: #0a1118;
            --pool-blue: #1d3557;
            --pool-gold: #fbc02d;
            --pool-green: #2ecc71;
            --text-light: #ecf0f1;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--pool-dark);
            color: var(--text-light);
            background-image: radial-gradient(circle at center, #1a2a3a 0%, #0a1118 100%);
        }

        /* Profile Header mimicking Game UI */
        .profile-header {
            background: linear-gradient(180deg, #1d3557 0%, #0a1118 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid var(--pool-gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--pool-gold);
            box-shadow: 0 0 20px var(--pool-gold);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .username { font-size: 2rem; margin: 0; color: var(--pool-gold); text-transform: uppercase; letter-spacing: 2px; }
        .stats { display: flex; justify-content: center; gap: 30px; margin-top: 15px; font-weight: bold; }
        .stat-item { color: var(--pool-green); }

        /* Media Sections */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        h2 { border-left: 5px solid var(--pool-gold); padding-left: 15px; margin-bottom: 25px; }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: scale(1.03); border-color: var(--pool-gold); }
        .card img, .card video { width: 100%; height: 200px; object-fit: cover; display: block; }
        .card-info { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); }

        /* JavaScript-based Modal for expanding views */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        #modal img, #modal video { max-width: 90%; max-height: 80%; border: 2px solid var(--pool-gold); }
    </style>
</head>
<body>

    <header class="profile-header">
        <!-- Replace 'profile.jpg' with your image path -->
        <img src="image_6f847fdb.png" alt="Profile" class="profile-img">
        <h1 class="username">Pool Master</h1>
        <div class="stats">
            <div class="stat-item">Wins: 1,240</div>
            <div class="stat-item">Level: 85</div>
            <div class="stat-item" style="color: #3498db;">Total Coins: 50M</div>
        </div>
    </header>

    <div class="container">
        <h2>Game Screenshots</h2>
        <div class="media-grid">
            <!-- Add your pictures here -->
            <div class="card" onclick="openModal(this)">
                <img src="image_fd96d709.png" alt="Game Clip">
                <div class="card-info">10,000 cash at 100 level</div>
            </div>
            <div class="card" onclick="openModal(this)">
                <img src="download.jpg" alt="Game Clip">
                <div class="card-info">Rare Cue Unlock</div>
            </div>
        </div>

        <h2 style="margin-top: 60px;">Trickshot Videos</h2>
        <div class="media-grid">
            <!-- Add your videos here -->
            <div class="card">
                <video controls>
                    <source src="Screenrecording_20260216_102718_com.miniclip.eightballpool.mp4" type="video/mp4">
                    Your browser does not support videos.
                </video>
                <div class="card-info">Bank Shot Masterclass</div>
            </div>
        </div>
    </div>

    <!-- Modal for full view -->
    <div id="modal" onclick="this.style.display='none'">
        <div id="modal-content"></div>
    </div>

    <script>
        // Simple Internal JS for Modal interactivity
        function openModal(element) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            const clickedImg = element.querySelector('img').src;
            
            content.innerHTML = `<img src="${clickedImg}">`;
            modal.style.display = 'flex';
        }
    </script>

</body>
</html>
